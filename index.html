<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Youth Fellowship Bible Study</title>
  <style>
    :root{--bg:#fafbfc;--surface:#ffffff;--line:#e8ecf1;--muted:#94a3b8;--ink:#0f172a;--accent:#3b82f6;}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{padding:clamp(32px,7vw,90px);padding-bottom:110px;line-height:1.6}
    main{max-width:820px;margin:0 auto}
    .kicker{font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:1.1rem;font-weight:600}
    h1{font-family:Georgia,serif;font-weight:500;font-size:clamp(2.6rem,6vw,5rem);line-height:1.02;letter-spacing:-.02em;margin-bottom:1rem}
    h2{font-family:Georgia,serif;font-weight:500;font-size:clamp(1.6rem,3vw,2.35rem);margin-top:2.5rem;margin-bottom:.8rem}
    p{font-size:clamp(1.05rem,1.5vw,1.25rem);color:#475569;max-width:58ch}
    .accent{color:var(--accent)}
    .session{display:block;padding:1.15rem 1.25rem;margin:.8rem 0;background:var(--surface);border:1px solid var(--line);border-radius:16px;color:var(--ink);text-decoration:none;transition:.2s}
    .session:hover{border-color:var(--accent);transform:translateY(-1px)}
    .session strong{font-size:1.08rem}
    .date{display:block;color:#64748b;font-size:.92rem;margin-top:.2rem}
    .empty{color:#64748b;font-style:italic;font-size:1rem}
    .chrome{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:space-between;align-items:center;padding:.8rem 1.25rem;font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);background:rgba(250,251,252,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);z-index:10}
    .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:.6rem;vertical-align:middle}
    .home-link{color:var(--muted);text-decoration:none}.home-link:hover{color:var(--accent)}
    .qr-footer{display:flex;align-items:center;gap:.7rem;text-decoration:none;color:var(--muted)}
    .qr-footer:hover{color:var(--accent)}
    .qr-footer img{width:48px;height:48px;border-radius:8px;background:#fff;border:1px solid var(--line)}
    @media(max-width:680px){.chrome{font-size:.62rem;padding:.75rem .9rem}.qr-footer span{display:none}.qr-footer img{width:42px;height:42px}}
  </style>
</head>
<body>
  <main>
    <div class="kicker">Bible Study Archive</div>
    <h1>Youth Fellowship<br><span class="accent">Bible Study</span></h1>
    <p>Slides, videos, resources, and session archives for Youth Fellowship.</p>
    <h2>Current Sessions</h2>
    <div id="current-sessions"><p class="empty">Loading sessions...</p></div>
    <h2>Past Sessions</h2>
    <div id="past-sessions"><p class="empty">Loading sessions...</p></div>
  </main>
  <div class="chrome">
    <a class="home-link" href="https://ov8.github.io/bible-study-youth/"><span class="dot"></span>Youth Fellowship</a>
    <a class="qr-footer" href="https://ov8.github.io/bible-study-youth/" aria-label="QR code for Youth Fellowship Bible Study">
      <span>Share</span>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https%3A%2F%2Fov8.github.io%2Fbible-study-youth%2F" alt="QR code for Youth Fellowship Bible Study">
    </a>
  </div>
<script>
const repoApi="https://api.github.com/repos/ov8/bible-study-youth/contents/sessions";
const publicBase="https://ov8.github.io/bible-study-youth/sessions/";
const sessionTitles={"2026-06-05":"Bible 101: What Is the Bible?","2026-06-12":"Bible 101: God, Work, Money, and Purpose"};
const currentContainer=document.getElementById("current-sessions");
const pastContainer=document.getElementById("past-sessions");
const today=new Date(); today.setHours(0,0,0,0);
function formatDate(dateString){const date=new Date(dateString+"T19:30:00");return date.toLocaleDateString("en-CA",{weekday:"long",year:"numeric",month:"long",day:"numeric"})+" · 7:30 pm";}
function makeCard(session){const a=document.createElement("a");a.className="session";a.href=publicBase+session.fileName;a.innerHTML=`<strong>${session.title}</strong><span class="date">${formatDate(session.date)}</span>`;return a;}
fetch(repoApi).then(r=>r.json()).then(files=>{const sessions=files.filter(file=>/^\d{4}-\d{2}-\d{2}\.html$/.test(file.name)).map(file=>{const date=file.name.replace(".html","");return{date,fileName:file.name,title:sessionTitles[date]||"Youth Fellowship Session"};}).sort((a,b)=>b.date.localeCompare(a.date));currentContainer.innerHTML="";pastContainer.innerHTML="";let currentCount=0,pastCount=0;sessions.forEach(session=>{const sessionDate=new Date(session.date+"T00:00:00");if(sessionDate>=today){currentContainer.appendChild(makeCard(session));currentCount++;}else{pastContainer.appendChild(makeCard(session));pastCount++;}});if(!currentCount)currentContainer.innerHTML=`<p class="empty">No current sessions posted yet.</p>`;if(!pastCount)pastContainer.innerHTML=`<p class="empty">No past sessions yet.</p>`;}).catch(err=>{currentContainer.innerHTML=`<p class="empty">Could not load sessions. Please refresh.</p>`;pastContainer.innerHTML="";console.error(err);});
</script>
</body>
</html>
